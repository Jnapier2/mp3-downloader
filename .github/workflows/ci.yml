name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: windows-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install exact runtime dependencies
        run: "python -m pip install --require-hashes --only-binary=:all: -r requirements.txt"
      - name: Validate runtime imports
        run: python -c "import certifi, yt_dlp"
      - name: Compile
        run: python -m compileall -q mp3_downloader.py tests
      - name: Test offline behavior
        run: python -m unittest discover -s tests -v
